<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEITO大戦争 - ミニタワーディフェンス</title>
<style>
:root {
  color-scheme: dark;
  --bg: #10131a;
  --panel: #191f2b;
  --panel-2: #222a38;
  --line: #344052;
  --text: #f6f7fb;
  --muted: #b8c0cf;
  --gold: #ffd166;
  --blue: #66d9ef;
  --red: #ff6b6b;
  --green: #8ce99a;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 20% 0%, rgba(102, 217, 239, 0.16), transparent 32rem),
    linear-gradient(180deg, #151925 0%, var(--bg) 100%);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
}

.app {
  width: min(1040px, 100%);
  margin: 0 auto;
  padding: 10px;
}

.brand-header {
  margin-bottom: 8px;
}

h1 {
  margin: 0;
  font-size: clamp(22px, 3.6vw, 34px);
  line-height: 1.05;
  letter-spacing: 0;
}

.game-shell {
  position: relative;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: #0c1017;
  box-shadow: 0 18px 46px rgba(0, 0, 0, 0.36);
}

[hidden] {
  display: none !important;
}

.stage-map {
  min-height: 640px;
  padding: 22px;
  background:
    linear-gradient(180deg, rgba(102, 217, 239, 0.12), transparent 42%),
    linear-gradient(180deg, #20283a 0%, #121824 100%);
}

.stage-map-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.stage-map-title {
  margin: 0;
  color: var(--gold);
  font-size: clamp(22px, 3.2vw, 34px);
  font-weight: 900;
  line-height: 1.1;
  text-shadow: 2px 2px 0 #000;
}

.stage-map-status {
  min-height: 34px;
  margin: 0;
  color: var(--muted);
  font-size: 14px;
  font-weight: 800;
  text-align: right;
}

.stage-route {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  align-items: stretch;
}

.stage-node {
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 10px;
  min-height: 456px;
  border: 2px solid rgba(255, 255, 255, 0.12);
  padding: 14px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
    #151b27;
  text-align: left;
}

.stage-node::after {
  display: none;
}

.stage-node:hover {
  border-color: var(--gold);
}

.stage-node[data-stage-map-action="locked"] {
  cursor: pointer;
  filter: none;
}

.stage-node-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: var(--gold);
  font-size: 15px;
  font-weight: 900;
}

.stage-node-badge {
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 999px;
  padding: 3px 8px;
  color: var(--text);
  background: rgba(0, 0, 0, 0.28);
  font-size: 12px;
}

.stage-node-image-wrap {
  display: grid;
  place-items: end center;
  min-height: 250px;
  border-radius: 6px;
  background:
    linear-gradient(180deg, rgba(102, 217, 239, 0.18), rgba(140, 233, 154, 0.16) 58%, rgba(51, 68, 94, 0.26) 59%),
    #0f1722;
  overflow: hidden;
}

.stage-node-image {
  width: min(168px, 72%);
  height: auto;
  display: block;
}

.stage-node-copy {
  display: grid;
  gap: 4px;
  color: var(--text);
}

.stage-node-chapter {
  color: var(--muted);
  font-size: 13px;
  font-weight: 900;
}

.stage-node-name {
  font-size: 18px;
  font-weight: 900;
  line-height: 1.24;
}

.stage-node-meta {
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.stage-node-locked {
  opacity: 0.72;
}

.stage-node-locked .stage-node-image {
  filter: grayscale(0.2) brightness(0.82);
}

.battle-view {
  position: relative;
}

.battle-hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 12px;
  pointer-events: none;
}

.stage-chip,
.hud-board {
  border: 2px solid rgba(255, 209, 102, 0.42);
  background: rgba(0, 0, 0, 0.72);
  box-shadow: 0 4px 0 rgba(0, 0, 0, 0.42);
}

.stage-chip {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8px;
  align-items: center;
  max-width: min(520px, 56vw);
  padding: 6px 10px;
  border-radius: 8px;
}

.pause-mark {
  display: inline-grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 2px solid #f6f7fb;
  border-radius: 50%;
  color: #10131a;
  background: var(--gold);
  font-weight: 900;
}

.stage-title {
  display: block;
  color: var(--gold);
  font-size: clamp(16px, 2.4vw, 25px);
  font-weight: 900;
  line-height: 1.12;
}

.stage-sub {
  display: block;
  margin-top: 3px;
  color: #f6f7fb;
  font-size: 12px;
  font-weight: 800;
}

.hud-board {
  min-width: 256px;
  padding: 7px 10px 8px;
  border-radius: 8px;
  text-align: right;
}

.money-line {
  color: var(--gold);
  font-size: clamp(22px, 3.5vw, 36px);
  font-weight: 900;
  line-height: 1;
  text-shadow: 2px 2px 0 #000;
}

.money-line span { font-size: 0.62em; }

.compact-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 5px 10px;
  margin-top: 5px;
  color: #f6f7fb;
  font-size: 12px;
  font-weight: 800;
}

.compact-stats span { color: var(--muted); }

.audience-line {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 7px;
  padding: 4px 8px;
  border: 1px solid rgba(102, 217, 239, 0.36);
  border-radius: 4px;
  background: rgba(102, 217, 239, 0.13);
  color: #f6f7fb;
  font-size: 12px;
  font-weight: 900;
  line-height: 1;
}

.audience-line strong {
  color: var(--blue);
  text-shadow: 1px 1px 0 #000;
}

.audience-pulse {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 0 rgba(140, 233, 154, 0.55);
  animation: audiencePulse 1.7s ease-out infinite;
}

@keyframes audiencePulse {
  0% { box-shadow: 0 0 0 0 rgba(140, 233, 154, 0.55); }
  70% { box-shadow: 0 0 0 8px rgba(140, 233, 154, 0); }
  100% { box-shadow: 0 0 0 0 rgba(140, 233, 154, 0); }
}

canvas {
  display: block;
  width: 100%;
  height: auto;
  background: #101923;
}

.summon-deck {
  display: grid;
  grid-template-columns: repeat(4, minmax(132px, 1fr));
  gap: 10px;
  padding: 12px 14px;
  border-top: 1px solid var(--line);
  background:
    linear-gradient(180deg, #252d3c 0%, #161c27 100%);
}

button {
  position: relative;
  min-height: 72px;
  border: 3px solid #05070b;
  border-radius: 5px;
  padding: 10px 10px 22px;
  background:
    linear-gradient(180deg, rgba(255, 209, 102, 0.52) 0%, rgba(255, 209, 102, 0.1) 42%, #1f2634 43%, #151a24 100%);
  color: var(--text);
  font: inherit;
  font-weight: 900;
  cursor: pointer;
  box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.12), 0 4px 0 rgba(0, 0, 0, 0.42);
  text-shadow: 1px 1px 0 #000;
  --cooldown-fill: 0%;
}

button::after {
  content: "";
  position: absolute;
  left: 9px;
  right: 9px;
  bottom: 8px;
  height: 7px;
  border: 2px solid #05070b;
  background:
    linear-gradient(90deg, #39e6ff var(--cooldown-fill), #151a24 0);
}

button:hover { border-color: var(--gold); }
button:disabled {
  cursor: not-allowed;
  color: #858d9b;
  filter: grayscale(0.55) brightness(0.74);
}

.command-card {
  background:
    linear-gradient(180deg, rgba(102, 217, 239, 0.42) 0%, rgba(102, 217, 239, 0.1) 42%, #202737 43%, #151a24 100%);
}

.message {
  min-height: 40px;
  padding: 10px 12px 14px;
  text-align: center;
  color: var(--muted);
  background: var(--panel);
}

.message strong { color: var(--gold); }

.note {
  margin: 12px 0 0;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

@media (max-width: 760px) {
  .battle-hud {
    position: static;
    display: grid;
    padding: 8px;
    background: #0c1017;
  }
  .stage-chip,
  .hud-board {
    max-width: none;
    width: 100%;
  }
  .hud-board {
    min-width: 0;
    text-align: left;
  }
  .compact-stats {
    justify-content: flex-start;
  }
  .summon-deck {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 10px;
  }
  button {
    min-height: 60px;
    padding: 8px 8px 20px;
    font-size: 14px;
  }
  .stage-map {
    min-height: auto;
    padding: 12px;
  }
  .stage-map-header {
    display: grid;
  }
  .stage-map-status {
    text-align: left;
  }
  .stage-route {
    grid-template-columns: 1fr;
  }
  .stage-node {
    min-height: 0;
  }
  .stage-node-image-wrap {
    min-height: 180px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .audience-pulse {
    animation: none;
  }
}
</style>
</head>
<body>
<main class="app">
  <header class="brand-header">
    <h1>KEITO大戦争</h1>
  </header>

  <section class="game-shell" aria-label="ゲーム画面">
    <section class="stage-map" id="stageMap" aria-label="ステージマップ">
      <div class="stage-map-header">
        <h2 class="stage-map-title">ステージマップ</h2>
        <p class="stage-map-status" id="stageMapStatus">1ステージ目を選んで開始できます。2・3ステージ目は準備中です。</p>
      </div>
      <div class="stage-route" aria-label="ステージ一覧">
        <button id="startStage0" class="stage-node stage-node-playable" data-stage-map-index="0" data-stage-map-action="start">
          <span class="stage-node-label">STAGE 1 <span class="stage-node-badge">開始</span></span>
          <span class="stage-node-image-wrap">
            <img class="stage-node-image" src="assets/base-enemy-stage-1-gold-castle.png" alt="">
          </span>
          <span class="stage-node-copy">
            <span class="stage-node-chapter">大地編</span>
            <span class="stage-node-name">大地をゆるがすワンワンステージ</span>
            <span class="stage-node-meta">最初の敵拠点をこわそう</span>
          </span>
        </button>
        <button id="lockedStage1" class="stage-node stage-node-locked" data-stage-map-index="1" data-stage-map-action="locked">
          <span class="stage-node-label">STAGE 2 <span class="stage-node-badge">準備中</span></span>
          <span class="stage-node-image-wrap">
            <img class="stage-node-image" src="assets/base-enemy-stage-2-green-castle.png" alt="">
          </span>
          <span class="stage-node-copy">
            <span class="stage-node-chapter">埼玉編</span>
            <span class="stage-node-name">みどりの砦は準備中</span>
            <span class="stage-node-meta">次のアップデートで開放予定</span>
          </span>
        </button>
        <button id="lockedStage2" class="stage-node stage-node-locked" data-stage-map-index="2" data-stage-map-action="locked">
          <span class="stage-node-label">STAGE 3 <span class="stage-node-badge">準備中</span></span>
          <span class="stage-node-image-wrap">
            <img class="stage-node-image" src="assets/base-enemy-stage-3-red-black-castle.png" alt="">
          </span>
          <span class="stage-node-copy">
            <span class="stage-node-chapter">東京編</span>
            <span class="stage-node-name">赤黒の砦は準備中</span>
            <span class="stage-node-meta">強敵ステージとして準備中</span>
          </span>
        </button>
      </div>
    </section>

    <section class="battle-view" id="battleView" aria-label="バトル" hidden>
      <div class="battle-hud" aria-label="ゲーム状況">
        <div class="stage-chip">
          <span class="pause-mark" aria-hidden="true">Ⅱ</span>
          <span>
            <span class="stage-title" id="stageName">大地をゆるがすワンワンステージ</span>
            <span class="stage-sub"><span id="stageChapter">大地編</span>｜EXP <strong id="experience">0 / 100</strong></span>
          </span>
        </div>
        <div class="hud-board">
          <div class="money-line"><strong id="money">180</strong><span>円</span></div>
          <div class="compact-stats">
            <span>撃破 <strong id="defeats">0</strong></span>
          </div>
          <div class="audience-line" aria-label="現在の参戦人数">
            <span class="audience-pulse" aria-hidden="true"></span>
            <span>参戦中 <strong id="viewerCount">--</strong></span>
          </div>
        </div>
      </div>
      <canvas id="game" width="960" height="480"></canvas>
      <div class="summon-deck">
        <button id="spawnNeko" class="summon-card">まるねこ 50</button>
        <button id="spawnTank" class="summon-card">かたいねこ 80</button>
        <button id="spawnBattle" class="summon-card">こうげきねこ 110</button>
        <button id="restart" class="command-card">リスタート</button>
      </div>
      <div class="message" id="message">
        右の陣地からユニットを召喚して、左の敵拠点をこわそう。
      </div>
    </section>
  </section>

  <p class="note">非公式ファン制作｜Google Analyticsで利用状況を計測し、現在の参戦人数表示のため匿名の一時信号を送信します。個人情報やゲーム内入力内容は保存しません。</p>
</main>

  const playableStageIds = new Set(STAGES.map((stage) => stage.id));
  const stageMapPlayableNodes = STAGE_MAP.filter((node) => node.status === "playable");
  if (!stageMapPlayableNodes.every((node) => playableStageIds.has(node.id))) {
    throw new Error("Playable stage-map nodes must point to real stages.");
  }

  let state;
  let selectedStageIndex = 0;
  let battleActive = false;
  let lastTime = performance.now();
  const spriteCache = new Map();
  const backgroundCache = new Map();
  const baseImageCache = new Map();

  function currentStage() {
    const index = state && typeof state.stageIndex === "number" ? state.stageIndex : 0;
    return STAGES[index] || STAGES[0];
  }

  function analyticsStageProps() {
    const stage = currentStage();
    return {
      stageId: stage.id,
      chapter: stage.chapter,
      stageName: stage.name
    };
  }

  function trackGameEvent(eventName, props = {}) {
    if (!Object.values(ANALYTICS_EVENTS).includes(eventName)) return;
    const safeProps = sanitizeAnalyticsProps(eventName, props);
    if (!ANALYTICS_CONFIG.enabled) {
      trackNoopEvent(eventName, safeProps);
      return;
    }
    if (ANALYTICS_CONFIG.provider === "google_analytics") {
      trackGoogleAnalyticsEvent(eventName, safeProps);
      return;
    }
    trackNoopEvent(eventName, safeProps);
  }

  function trackNoopEvent() {}

  function sanitizeAnalyticsProps(eventName, props) {
    const allowedKeys = ANALYTICS_ALLOWED_PROPS[eventName] || [];
    return allowedKeys.reduce((safeProps, key) => {
      if (typeof props[key] === "string") safeProps[key] = props[key];
      return safeProps;
    }, {});
  }

  function trackGoogleAnalyticsEvent(eventName, props) {
    try {
      if (typeof window === "undefined" || typeof window.gtag !== "function") return;
      window.gtag("event", eventName, props);
    } catch (error) {
      trackNoopEvent(eventName, props);
    }
  }

  function initializeAnalyticsProvider() {
    if (!ANALYTICS_CONFIG.enabled || ANALYTICS_CONFIG.provider !== "google_analytics") return;
    if (!ANALYTICS_CONFIG.measurementId || !ANALYTICS_CONFIG.scriptSrc) return;
    if (typeof window !== "undefined") {
      window.dataLayer = window.dataLayer || [];
      window.gtag = window.gtag || function gtagQueue() {
        window.dataLayer.push(arguments);
      };
      try {
        window.gtag("js", new Date());
        window.gtag("config", ANALYTICS_CONFIG.measurementId, { send_page_view: false });
      } catch (error) {
        trackNoopEvent("google_analytics_init", {});
      }
    }
    if (typeof document === "undefined" || !document.head || typeof document.createElement !== "function") return;
    if (
      typeof document.querySelector === "function" &&
      document.querySelector(`script[src="${ANALYTICS_CONFIG.scriptSrc}"]`)
    ) {
      return;
    }
    const providerScript = document.createElement("script");
    providerScript.async = true;
    providerScript.src = ANALYTICS_CONFIG.scriptSrc;
    document.head.appendChild(providerScript);
  }

  function trackGameOpen() {
    if (analyticsSession.gameOpenSent) return;
    analyticsSession.gameOpenSent = true;
    trackGameEvent(ANALYTICS_EVENTS.gameOpen, analyticsStageProps());
  }

  function trackFirstSummon(kind, label) {
    if (analyticsSession.firstSummonSent) return;
    analyticsSession.firstSummonSent = true;
    trackGameEvent(ANALYTICS_EVENTS.firstSummon, {
      ...analyticsStageProps(),
      unitKind: kind,
      unitLabel: label
    });
  }

  function trackStageClear() {
    if (analyticsSession.stageClearSent) return;
    analyticsSession.stageClearSent = true;
    trackGameEvent(ANALYTICS_EVENTS.stageClear, analyticsStageProps());
  }

  function createLiveAudienceSessionId() {
    if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
      return crypto.randomUUID();
    }
    return `page-${Date.now()}-${Math.random().toString(36).slice(2)}`;
  }

  function initializeLiveAudience() {
    if (!LIVE_AUDIENCE_CONFIG.enabled || !LIVE_AUDIENCE_CONFIG.endpoint || typeof fetch !== "function") {
      updateLiveAudienceDisplay(null);
      return;
    }
    trackLiveAudienceHeartbeat();
    if (typeof setInterval === "function") {
      liveAudienceSession.intervalId = setInterval(trackLiveAudienceHeartbeat, LIVE_AUDIENCE_CONFIG.heartbeatMs);
    }
  }

  function trackLiveAudienceHeartbeat() {
    return fetch(LIVE_AUDIENCE_CONFIG.endpoint, {
      method: "POST",
      headers: {
        "content-type": "application/json"
      },
      body: JSON.stringify({
        sessionId: liveAudienceSession.sessionId
      }),
      cache: "no-store"
    })
      .then((response) => {
        if (!response.ok) throw new Error("live audience heartbeat failed");
        return response.json();
      })
      .then((data) => {
        if (!Number.isInteger(data.count) || data.count < 0) throw new Error("invalid live audience count");
        updateLiveAudienceDisplay(data.count);
      })
      .catch(() => {
        updateLiveAudienceDisplay(null);
      });
  }

  function updateLiveAudienceDisplay(count) {
    ui.viewerCount.textContent = Number.isInteger(count) ? String(count) : "--";
  }

  function createInitialState(stageIndex) {
    const safeStageIndex = STAGES[stageIndex] ? stageIndex : 0;
    const stage = STAGES[safeStageIndex];
    return {
      stageIndex: safeStageIndex,
      money: stage.startMoney,
      allyBaseHp: stage.allyBaseHp,
      enemyBaseHp: stage.enemyBaseHp,
      targetExperience: stage.targetExperience,
      experience: 0,
      defeats: 0,
      units: [],
      enemies: [],
      effects: [],
      experienceNoticeShown: false,
      summonCooldowns: {
        neko: 0,
        tank: 0,
        battle: 0
      },
      elapsed: 0,
      enemySpawnTimer: stage.enemySpawnFirstMs,
      incomeTimer: 0,
      stageIntroTimer: 2200,
      gameOver: false,
      result: "playing",
      clearBonusApplied: false,
      message: `${stage.chapter}、${stage.name}。右の陣地からユニットを召喚して、左の敵拠点をこわそう。`
    };
  }

  function initializeGame() {
    selectedStageIndex = 0;
    state = createInitialState(selectedStageIndex);
    renderStageMap();
    updateUI();
    showStageMap();
    trackGameOpen();
  }

  function resetGame() {
    state = createInitialState(selectedStageIndex);
    lastTime = performance.now();
    showBattleView();
    updateUI();
    trackGameOpen();
  }

  function startStage(stageIndex) {
    const mapNode = STAGE_MAP.find((node) => node.stageIndex === stageIndex && node.status === "playable");
    if (!mapNode || !STAGES[stageIndex]) {
      updateStageMapStatus("このステージはまだ準備中です。");
      showStageMap();
      return;
    }
    selectedStageIndex = stageIndex;
    resetGame();
  }

  function selectStageMapNode(mapIndex) {
    const node = STAGE_MAP[mapIndex];
    if (!node) return;
    if (node.status !== "playable") {
      updateStageMapStatus(`${node.chapter}は準備中です。もう少し待ってね。`);
      showStageMap();
      return;
    }
    startStage(node.stageIndex);
  }

  function renderStageMap() {
    STAGE_MAP.forEach((node, index) => {
      const button = ui[node.buttonId];
      if (!button) return;
      button.dataset.stageMapIndex = String(index);
      button.dataset.stageMapAction = node.status === "playable" ? "start" : "locked";
      button.setAttribute("aria-label", node.status === "playable" ? `${node.name}を開始` : `${node.name}。準備中`);
    });
    updateStageMapStatus("1ステージ目を選んで開始できます。2・3ステージ目は準備中です。");
  }

  function updateStageMapStatus(message) {
    ui.stageMapStatus.textContent = message;
  }

  function showStageMap() {
    battleActive = false;
    ui.stageMap.hidden = false;
    ui.battleView.hidden = true;
  }

  function showBattleView() {
    battleActive = true;
    ui.stageMap.hidden = true;
    ui.battleView.hidden = false;
  }

  function createFighter(kind, type, x, team) {
    return {
      id: crypto.randomUUID ? crypto.randomUUID() : `${team}-${Date.now()}-${Math.random()}`,
      kind,
      label: type.label,
      team,
      x,
      y: FIGHTER_GROUND_Y,
      width: type.spriteWidth || (team === "ally" ? 30 : 32),
      height: type.spriteHeight || (team === "ally" ? 44 : 38),
      hp: type.hp,
      maxHp: type.hp,
      attack: type.attack,
      range: type.range,
      speed: type.speed,
      cooldownMax: type.cooldown,
      cooldown: 0,
      reward: type.reward || 0,
      color: type.color,
      sprite: type.sprite || null,
      spriteWidth: type.spriteWidth || null,
      spriteHeight: type.spriteHeight || null,
      hitFlash: 0
    };
  }

  function spendMoney(amount) {
    if (!battleActive || state.money < amount || state.gameOver) return false;
    state.money -= amount;
    return true;
  }

  function canSummon(kind) {
    const type = UNIT_TYPES[kind];
    return battleActive && !state.gameOver && state.money >= type.cost && state.summonCooldowns[kind] <= 0;
  }

  function formatSummonLabel(kind) {
    const type = UNIT_TYPES[kind];
    return `${type.label} ${type.cost}`;
  }

  function spawnUnit(kind) {
    const type = UNIT_TYPES[kind];
    if (!battleActive) return;
    if (state.gameOver) return;
    if (state.summonCooldowns[kind] > 0) {
      state.message = `${type.label}は準備中。あと少し待とう。`;
      updateUI();
      return;
    }
    if (!spendMoney(type.cost)) {
      state.message = "お金が足りない。敵を倒すか少し待とう。";
      updateUI();
      return;
    }
    state.units.push(createFighter(kind, type, ALLY_BASE_X - 58, "ally"));
    trackFirstSummon(kind, type.label);
    state.summonCooldowns[kind] = type.summonCooldownMs;
    state.message = `${type.label}を召喚した。`;
    updateUI();
  }

  function spawnEnemy() {
    if (state.gameOver) return;
    const enemy = chooseEnemyType();
    state.enemies.push(createFighter(enemy.kind, enemy.type, ENEMY_BASE_X + 24, "enemy"));
  }

  function chooseEnemyType() {
    const stage = currentStage();
    const totalWeight = stage.enemySpawnTable.reduce((sum, entry) => sum + entry.weight, 0);
    let roll = Math.random() * totalWeight;
    for (const entry of stage.enemySpawnTable) {
      roll -= entry.weight;
      if (roll <= 0) return { kind: entry.kind, type: ENEMY_TYPES[entry.kind] };
    }
    return { kind: "pyoko", type: ENEMY_TYPES.pyoko };
  }

  function loadCharacterSprites() {
    if (typeof Image === "undefined") return;
    [...Object.values(UNIT_TYPES), ...Object.values(ENEMY_TYPES)].forEach((type) => {
      if (!type.sprite) return;
      const image = new Image();
      image.onload = () => {
        spriteCache.set(type.sprite, prepareSprite(image));
      };
      image.onerror = () => {
        spriteCache.set(type.sprite, null);
      };
      image.src = type.sprite;
    });
  }

  function loadStageBackgrounds() {
    if (typeof Image === "undefined") return;
    STAGES.forEach((stage) => {
      if (!stage.background) return;
      const image = new Image();
      image.onload = () => {
        backgroundCache.set(stage.background, image);
      };
      image.onerror = () => {
        backgroundCache.set(stage.background, null);
      };
      image.src = stage.background;
    });
  }

  function loadBaseImages() {
    if (typeof Image === "undefined") return;
    const baseSprites = new Set([
      ALLY_BASE_SPRITE,
      ...FUTURE_ENEMY_BASE_SPRITES,
      ...STAGES.map((stage) => stage.enemyBaseSprite).filter(Boolean)
    ]);

    baseSprites.forEach((sprite) => {
      const image = new Image();
      image.onload = () => {
        baseImageCache.set(sprite, image);
      };
      image.onerror = () => {
        baseImageCache.set(sprite, null);
      };
      image.src = sprite;
    });
  }

  function prepareSprite(image) {
    const source = document.createElement("canvas");
    source.width = image.naturalWidth || image.width;
    source.height = image.naturalHeight || image.height;
    const sourceCtx = source.getContext("2d");
    sourceCtx.drawImage(image, 0, 0);

    const imageData = sourceCtx.getImageData(0, 0, source.width, source.height);
    const data = imageData.data;
    const visited = new Uint8Array(source.width * source.height);
    const queue = [];

    const enqueue = (x, y) => {
      if (x < 0 || y < 0 || x >= source.width || y >= source.height) return;
      const index = y * source.width + x;
      if (visited[index]) return;
      const offset = index * 4;
      if (!isBackgroundPixel(data[offset], data[offset + 1], data[offset + 2], data[offset + 3])) return;
      visited[index] = 1;
      queue.push(index);
    };

    for (let x = 0; x < source.width; x += 1) {
      enqueue(x, 0);
      enqueue(x, source.height - 1);
    }
    for (let y = 0; y < source.height; y += 1) {
      enqueue(0, y);
      enqueue(source.width - 1, y);
    }

    while (queue.length) {
      const index = queue.shift();
      const x = index % source.width;
      const y = Math.floor(index / source.width);
      enqueue(x + 1, y);
      enqueue(x - 1, y);
      enqueue(x, y + 1);
      enqueue(x, y - 1);
    }

    for (let index = 0; index < visited.length; index += 1) {
      if (visited[index]) data[index * 4 + 3] = 0;
    }
    sourceCtx.putImageData(imageData, 0, 0);

    const bounds = findOpaqueBounds(imageData, source.width, source.height);
    if (!bounds) return source;

    const trimmed = document.createElement("canvas");
    trimmed.width = bounds.width;
    trimmed.height = bounds.height;
    trimmed.getContext("2d").drawImage(
      source,
      bounds.x,
      bounds.y,
      bounds.width,
      bounds.height,
      0,
      0,
      bounds.width,
      bounds.height
    );
    return trimmed;
  }

  function isBackgroundPixel(r, g, b, a) {
    const brightest = Math.max(r, g, b);
    const darkest = Math.min(r, g, b);
    return a < 12 || (brightest > 212 && brightest - darkest < 34);
  }

  function findOpaqueBounds(imageData, width, height) {
    const data = imageData.data;
    let minX = width;
    let minY = height;
    let maxX = -1;
    let maxY = -1;
    for (let y = 0; y < height; y += 1) {
      for (let x = 0; x < width; x += 1) {
        if (data[(y * width + x) * 4 + 3] <= 0) continue;
        minX = Math.min(minX, x);
        minY = Math.min(minY, y);
        maxX = Math.max(maxX, x);
        maxY = Math.max(maxY, y);
      }
    }
    if (maxX < minX || maxY < minY) return null;
    return {
      x: minX,
      y: minY,
      width: maxX - minX + 1,
      height: maxY - minY + 1
    };
  }

  function findTarget(actor) {
    const opponents = actor.team === "ally" ? state.enemies : state.units;
    let nearest = null;
    let nearestDistance = Infinity;
    for (const target of opponents) {
      const distance = Math.abs(target.x - actor.x);
      if (distance < nearestDistance) {
        nearest = target;
        nearestDistance = distance;
      }
    }
    return { target: nearest, distance: nearestDistance };
  }

  function attackBase(actor) {
    const baseX = actor.team === "ally" ? ENEMY_BASE_X : ALLY_BASE_X;
    const distance = Math.abs(actor.x - baseX);
    if (distance > actor.range + 26) return false;
    if (actor.cooldown > 0) return true;

    if (actor.team === "ally") {
      const previousHp = state.enemyBaseHp;
      state.enemyBaseHp = Math.max(0, state.enemyBaseHp - actor.attack);
      const damage = previousHp - state.enemyBaseHp;
      addEffect("baseHit", baseX, GROUND_Y - 78, "#ffd166", "ally");
      addExperience(Math.ceil(damage * currentStage().baseHitExperienceRate), baseX, GROUND_Y - 104);
    } else {
      state.allyBaseHp = Math.max(0, state.allyBaseHp - actor.attack);
      addEffect("baseHit", baseX, GROUND_Y - 78, "#ff8787", "enemy");
    }
    actor.cooldown = actor.cooldownMax;
    return true;
  }

  function updateFighter(actor, dt) {
    actor.cooldown = Math.max(0, actor.cooldown - dt);
    actor.hitFlash = Math.max(0, actor.hitFlash - dt);

    const { target, distance } = findTarget(actor);
    if (target && distance <= actor.range + target.width * 0.5) {
      if (actor.cooldown <= 0) {
        target.hp -= actor.attack;
        target.hitFlash = 8;
        actor.cooldown = actor.cooldownMax;
        addEffect(actor.team === "ally" ? "slash" : "impact", target.x, target.y - target.height * 0.5, actor.team === "ally" ? "#ffd166" : "#ff8787", actor.team);
        addEffect("spark", target.x, target.y - target.height * 0.55, actor.team === "ally" ? "#66d9ef" : "#ffb3b3", actor.team);
      }
      return;
    }

    if (attackBase(actor)) return;

    actor.x += actor.team === "ally" ? -actor.speed * dt : actor.speed * dt;
  }

  function addEffect(type, x, y, color, team) {
    const maxLife = type === "clearBurst" ? 90 : 28;
    state.effects.push({
      type,
      x,
      y,
      color,
      team,
      life: maxLife,
      maxLife,
      angle: Math.random() * Math.PI * 2
    });
  }

  function addExperience(amount, x, y) {
    if (amount <= 0 || state.gameOver) return;
    const gained = Math.min(amount, state.targetExperience - state.experience);
    if (gained <= 0) return;
    state.experience += gained;
    maybeShowExperienceNotice(x, y - 24);
  }

  function maybeShowExperienceNotice(x, y) {
    if (state.experienceNoticeShown || state.experience < state.targetExperience || state.gameOver) return;
    state.experienceNoticeShown = true;
    addEffect("spark", x, y + 18, "#ffd166", "ally");
    state.message = "経験値がたまったよ！敵拠点をこわせばクリアだよ。";
  }

  function removeDefeated() {
    state.enemies = state.enemies.filter((enemy) => {
      if (enemy.hp > 0) return true;
      const stage = currentStage();
      const experience = stage.enemyDefeatExperience[enemy.kind] || 0;
      state.money += enemy.reward;
      state.defeats += 1;
      addExperience(experience, enemy.x, enemy.y - 72);
      addEffect("impact", enemy.x, enemy.y - enemy.height * 0.55, "#ffd166", "ally");
      return false;
    });

    state.units = state.units.filter((unit) => unit.hp > 0);
  }

  function updateGame(deltaMs) {
    if (!battleActive) return;
    const dt = Math.min(deltaMs / 16.67, 3);
    if (state.gameOver) {
      updateEffects(dt);
      return;
    }

    const stage = currentStage();
    state.elapsed += deltaMs;
    state.enemySpawnTimer -= deltaMs;
    state.incomeTimer -= deltaMs;
    state.stageIntroTimer = Math.max(0, state.stageIntroTimer - deltaMs);
    updateSummonCooldowns(deltaMs);

    if (state.enemySpawnTimer <= 0) {
      spawnEnemy();
      state.enemySpawnTimer = Math.max(stage.enemySpawnMinMs, stage.enemySpawnBaseMs - state.elapsed * 0.01);
    }

    if (state.incomeTimer <= 0) {
      state.money += 8;
      state.incomeTimer = 1000;
    }

    [...state.units, ...state.enemies].forEach((fighter) => updateFighter(fighter, dt));
    removeDefeated();
    updateEffects(dt);
    checkResult();
    updateUI();
  }

  function updateSummonCooldowns(deltaMs) {
    Object.keys(state.summonCooldowns).forEach((kind) => {
      state.summonCooldowns[kind] = Math.max(0, state.summonCooldowns[kind] - deltaMs);
    });
  }

  function updateEffects(dt) {
    state.effects.forEach((effect) => {
      effect.life -= dt;
      effect.y -= effect.type === "clearBurst" ? 0.03 * dt : 0;
    });
    state.effects = state.effects.filter((effect) => effect.life > 0);
  }

  function checkResult() {
    if (state.gameOver) return;
    const stage = currentStage();
    if (state.enemyBaseHp <= 0) {
      state.gameOver = true;
      state.result = "win";
      if (!state.clearBonusApplied) {
        state.money += stage.clearBonus;
        state.clearBonusApplied = true;
      }
      addEffect("clearBurst", WIDTH / 2, 206, "#ffd166", "ally");
      trackStageClear();
      state.message = `BOSS撃破! ${stage.name} クリア。勝利ボーナス +${stage.clearBonus}！`;
    } else if (state.allyBaseHp <= 0) {
      state.gameOver = true;
      state.result = "lose";
      state.message = `${stage.chapter}で作戦を立て直そう。`;
    }
  }

  function updateUI() {
    const stage = currentStage();
    ui.stageChapter.textContent = stage.chapter;
    ui.stageName.textContent = stage.name;
    ui.money.textContent = Math.floor(state.money);
    ui.defeats.textContent = state.defeats;
    ui.experience.textContent = `${Math.floor(state.experience)} / ${state.targetExperience}`;
    ui.message.innerHTML = state.gameOver
      ? `<strong>${state.message}</strong>`
      : state.message;
    ui.spawnNeko.textContent = formatSummonLabel("neko");
    ui.spawnTank.textContent = formatSummonLabel("tank");
    ui.spawnBattle.textContent = formatSummonLabel("battle");
    ui.spawnNeko.disabled = !canSummon("neko");
    ui.spawnTank.disabled = !canSummon("tank");
    ui.spawnBattle.disabled = !canSummon("battle");
    updateCooldownBars();
  }

  function updateCooldownBars() {
    [
      ["neko", ui.spawnNeko],
      ["tank", ui.spawnTank],
      ["battle", ui.spawnBattle]
    ].forEach(([kind, button]) => {
      const type = UNIT_TYPES[kind];
      const remaining = state.gameOver ? 0 : state.summonCooldowns[kind];
      const progress = 1 - Math.min(1, remaining / type.summonCooldownMs);
      button.style.setProperty("--cooldown-fill", `${Math.round(progress * 100)}%`);
    });
    ui.restart.style.setProperty("--cooldown-fill", "100%");
  }

  function drawBackground() {
    const stage = currentStage();
    const background = stage.background ? backgroundCache.get(stage.background) : null;
    if (background) {
      drawStageBackgroundImage(background);
      return;
    }
    drawFallbackBackground();
  }

  function drawStageBackgroundImage(image) {
    const imageWidth = image.naturalWidth || image.width;
    const imageHeight = image.naturalHeight || image.height;
    const scale = Math.max(WIDTH / imageWidth, HEIGHT / imageHeight);
    const drawWidth = imageWidth * scale;
    const drawHeight = imageHeight * scale;
    const dx = (WIDTH - drawWidth) / 2;
    const dy = HEIGHT - drawHeight;
    ctx.drawImage(image, dx, dy, drawWidth, drawHeight);
  }

  function drawFallbackBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
    sky.addColorStop(0, "#162132");
    sky.addColorStop(0.66, "#111923");
    sky.addColorStop(1, "#0d1118");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    ctx.fillStyle = "rgba(102, 217, 239, 0.08)";
    for (let i = 0; i < 9; i += 1) {
      const x = (i * 138 + (state.elapsed * 0.01)) % (WIDTH + 120) - 80;
      ctx.beginPath();
      ctx.arc(x, 90 + (i % 3) * 36, 28 + (i % 2) * 12, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = "#263449";
    ctx.fillRect(0, GROUND_Y + 34, WIDTH, HEIGHT - GROUND_Y);
    ctx.fillStyle = "#33445e";
    ctx.fillRect(0, GROUND_Y + 24, WIDTH, 18);

    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 2;
    for (let x = 0; x < WIDTH; x += 48) {
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y + 44);
      ctx.lineTo(x + 22, HEIGHT);
      ctx.stroke();
    }
  }

  function drawBase(x, hp, team) {
    const isAlly = team === "ally";
    const stage = currentStage();
    const maxHp = isAlly ? stage.allyBaseHp : stage.enemyBaseHp;
    drawBaseStructure(x, hp, team);
    drawBaseHpText(x, hp, maxHp);
  }

  function drawBaseStructure(x, hp, team) {
    if (drawBaseImage(x, team)) return;
    drawCanvasBaseStructure(x, hp, team);
  }

  function drawBaseImage(x, team) {
    const sprite = team === "ally" ? ALLY_BASE_SPRITE : currentStage().enemyBaseSprite;
    const image = sprite ? baseImageCache.get(sprite) : null;
    if (!image) return false;

    const imageWidth = image.naturalWidth || image.width;
    const imageHeight = image.naturalHeight || image.height;
    const drawHeight = 148;
    const drawWidth = drawHeight * (imageWidth / imageHeight);
    const dx = x - drawWidth / 2;
    const dy = BASE_IMAGE_GROUND_Y - drawHeight;

    ctx.drawImage(image, dx, dy, drawWidth, drawHeight);
    return true;
  }

  function drawCanvasBaseStructure(x, hp, team) {
    const isAlly = team === "ally";
    const body = isAlly ? "#2b8a9f" : "#8f3d4f";
    const cap = isAlly ? "#66d9ef" : "#ff6b6b";
    const dark = isAlly ? "#174d5b" : "#572638";

    ctx.fillStyle = "rgba(0, 0, 0, 0.32)";
    ctx.beginPath();
    ctx.ellipse(x, GROUND_Y + 25, 50, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = dark;
    ctx.fillRect(x - 36, GROUND_Y - 76, 72, 100);
    ctx.fillStyle = body;
    ctx.fillRect(x - 29, GROUND_Y - 92, 58, 116);

    if (isAlly) {
      ctx.fillStyle = "#163f4d";
      ctx.fillRect(x + 16, GROUND_Y - 118, 12, 32);
      ctx.fillStyle = "#a5f3fc";
      ctx.fillRect(x + 6, GROUND_Y - 126, 34, 13);
      ctx.fillStyle = "#dff9ff";
      ctx.beginPath();
      ctx.arc(x - 10, GROUND_Y - 40, 10, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = "#3a1524";
      ctx.beginPath();
      ctx.moveTo(x - 34, GROUND_Y - 92);
      ctx.lineTo(x, GROUND_Y - 126);
      ctx.lineTo(x + 34, GROUND_Y - 92);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#ffccd5";
      ctx.fillRect(x - 13, GROUND_Y - 62, 26, 36);
    }

    ctx.fillStyle = cap;
    ctx.fillRect(x - 44, GROUND_Y - 104, 88, 26);
  }

  function drawBaseHpText(x, hp, maxHp) {
    const current = Math.max(0, Math.ceil(hp));
    const maximum = Math.ceil(maxHp);
    const text = `${current} / ${maximum}`;

    ctx.font = "800 15px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(13, 17, 24, 0.78)";
    ctx.strokeText(text, x, GROUND_Y - 124);
    ctx.fillStyle = "#f6f7fb";
    ctx.fillText(text, x, GROUND_Y - 124);
  }

  function drawFighter(fighter) {
    const pulse = fighter.hitFlash > 0 ? 1 : 0;
    ctx.save();
    ctx.translate(fighter.x, fighter.y);

    drawFighterShadow(fighter);
    ctx.fillStyle = pulse ? "#ffffff" : fighter.color;
    drawCharacterSprite(fighter, pulse);

    ctx.restore();
  }

  function drawFighterShadow(fighter) {
    const drawWidth = fighter.spriteWidth || fighter.width;
    const shadowWidth = Math.max(22, drawWidth * 0.5);
    ctx.fillStyle = "rgba(0, 0, 0, 0.38)";
    ctx.beginPath();
    ctx.ellipse(0, 0, shadowWidth * 1.2, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(0, 0, 0, 0.58)";
    ctx.beginPath();
    ctx.ellipse(0, 0, shadowWidth * 0.88, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, 0, shadowWidth * 0.92, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  function drawCharacterSprite(fighter, pulse) {
    const sprite = fighter.sprite ? spriteCache.get(fighter.sprite) : null;
    const drawWidth = fighter.spriteWidth || fighter.width;
    const drawHeight = fighter.spriteHeight || fighter.height;
    if (sprite) {
      ctx.filter = pulse ? "brightness(1.7)" : "none";
      ctx.drawImage(sprite, -drawWidth / 2, -drawHeight, drawWidth, drawHeight);
      ctx.filter = "none";
      return;
    }

    if (fighter.team === "ally") {
      drawAllyFallback(fighter);
      return;
    }

    drawEnemyFallback(fighter);
  }

  function drawAllyFallback(fighter) {
    ctx.beginPath();
    ctx.roundRect(-fighter.width / 2, -fighter.height, fighter.width, fighter.height, 8);
    ctx.fill();
    ctx.fillStyle = "#0d1118";
    ctx.fillRect(-8, -fighter.height + 12, 4, 4);
    ctx.fillRect(5, -fighter.height + 12, 4, 4);
    ctx.fillStyle = "#f6f7fb";
    ctx.fillRect(9, -fighter.height + 24, 16, 5);
  }

  function drawEnemyFallback(fighter) {
    ctx.beginPath();
    ctx.arc(0, -fighter.height / 2, fighter.width / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#10131a";
    ctx.fillRect(-9, -fighter.height / 2 - 6, 6, 6);
    ctx.fillRect(4, -fighter.height / 2 - 6, 6, 6);
    ctx.fillStyle = "#ffe3e3";
    ctx.fillRect(-9, -fighter.height / 2 + 9, 18, 4);
  }

  function drawEffects() {
    for (const effect of state.effects) {
      const progress = 1 - effect.life / effect.maxLife;
      const alpha = Math.max(0, effect.life / effect.maxLife);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = effect.color;
      ctx.fillStyle = effect.color;
      ctx.lineWidth = 3;
      ctx.translate(effect.x, effect.y);

      if (effect.type === "slash") {
        ctx.rotate(-0.55);
        ctx.beginPath();
        ctx.moveTo(-16 - progress * 8, 0);
        ctx.lineTo(18 + progress * 10, -8);
        ctx.stroke();
      } else if (effect.type === "impact") {
        ctx.beginPath();
        ctx.arc(0, 0, 8 + progress * 18, 0, Math.PI * 2);
        ctx.stroke();
      } else if (effect.type === "spark") {
        for (let i = 0; i < 5; i += 1) {
          const angle = effect.angle + i * (Math.PI * 2 / 5);
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * 4, Math.sin(angle) * 4);
          ctx.lineTo(Math.cos(angle) * (13 + progress * 10), Math.sin(angle) * (13 + progress * 10));
          ctx.stroke();
        }
      } else if (effect.type === "baseHit") {
        ctx.beginPath();
        ctx.arc(0, 0, 16 + progress * 26, 0, Math.PI * 2);
        ctx.stroke();
      } else if (effect.type === "clearBurst") {
        for (let i = 0; i < 12; i += 1) {
          const angle = effect.angle + i * (Math.PI * 2 / 12);
          const inner = 56 + progress * 10;
          const outer = 92 + progress * 34;
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
          ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
          ctx.stroke();
        }
      }

      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawStageIntro() {
    if (state.stageIntroTimer <= 0 || state.gameOver) return;
    const stage = currentStage();
    const alpha = Math.min(0.88, state.stageIntroTimer / 1200);
    ctx.save();
    ctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.62})`;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd166";
    ctx.font = "900 34px system-ui, sans-serif";
    ctx.fillText(stage.chapter, WIDTH / 2, 176);
    ctx.fillStyle = "#f6f7fb";
    ctx.font = "800 28px system-ui, sans-serif";
    ctx.fillText(stage.name, WIDTH / 2, 220);
    ctx.fillStyle = "#b8c0cf";
    ctx.font = "700 16px system-ui, sans-serif";
    ctx.fillText("左の敵拠点をこわそう", WIDTH / 2, 252);
    ctx.restore();
  }

  function drawResultBanner() {
    if (!state.gameOver) return;
    const stage = currentStage();
    ctx.fillStyle = "rgba(0, 0, 0, 0.58)";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.fillStyle = state.result === "win" ? "#ffd166" : "#ff8787";
    ctx.font = "900 54px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(state.result === "win" ? "STAGE CLEAR!" : "TRY AGAIN", WIDTH / 2, 214);
    ctx.fillStyle = "#f6f7fb";
    if (state.result === "win") {
      ctx.font = "900 24px system-ui, sans-serif";
      ctx.fillText("BOSS撃破!", WIDTH / 2, 252);
      ctx.font = "700 18px system-ui, sans-serif";
      ctx.fillText(`${stage.name} クリア`, WIDTH / 2, 282);
      ctx.fillStyle = "#ffd166";
      ctx.fillText(`勝利ボーナス +${stage.clearBonus}`, WIDTH / 2, 310);
      return;
    }
    ctx.font = "700 20px system-ui, sans-serif";
    ctx.fillText(state.message, WIDTH / 2, 252);
  }

  function draw() {
    drawBackground();
    drawBase(ALLY_BASE_X, state.allyBaseHp, "ally");
    drawBase(ENEMY_BASE_X, state.enemyBaseHp, "enemy");
    [...state.units, ...state.enemies]
      .sort((a, b) => a.x - b.x)
      .forEach(drawFighter);
    drawEffects();
    drawStageIntro();
    drawResultBanner();
  }

  function loop(now) {
    const deltaMs = now - lastTime;
    lastTime = now;
    if (battleActive) {
      updateGame(deltaMs);
      draw();
    }
    requestAnimationFrame(loop);
  }

  ui.startStage0.addEventListener("click", () => selectStageMapNode(0));
  ui.lockedStage1.addEventListener("click", () => selectStageMapNode(1));
  ui.lockedStage2.addEventListener("click", () => selectStageMapNode(2));
  ui.spawnNeko.addEventListener("click", () => spawnUnit("neko"));
  ui.spawnTank.addEventListener("click", () => spawnUnit("tank"));
  ui.spawnBattle.addEventListener("click", () => spawnUnit("battle"));
  ui.restart.addEventListener("click", resetGame);

  loadCharacterSprites();
  loadStageBackgrounds();
  loadBaseImages();
  initializeAnalyticsProvider();
  initializeGame();
  initializeLiveAudience();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
