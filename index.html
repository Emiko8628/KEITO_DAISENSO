<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=game.html">
<title>KEITO大戦争</title>
<style>
:root {
  color-scheme: dark;
  --bg: #10131a;
  --panel: #191f2b;
  --line: #344052;
  --text: #f6f7fb;
  --muted: #b8c0cf;
  --blue: #66d9ef;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at 20% 0%, rgba(102, 217, 239, 0.16), transparent 32rem),
    linear-gradient(180deg, #151925 0%, var(--bg) 100%);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
}

main {
  width: min(560px, 100%);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 28px;
  background: rgba(25, 31, 43, 0.9);
  text-align: center;
  box-shadow: 0 18px 46px rgba(0, 0, 0, 0.36);
}

h1 {
  margin: 0;
  font-size: clamp(30px, 7vw, 52px);
  line-height: 1.05;
  letter-spacing: 0;
}

p {
  margin: 14px 0 0;
  color: var(--muted);
  line-height: 1.7;
}

a {
  display: inline-block;
  margin-top: 22px;
  border: 1px solid #46546a;
  border-radius: 8px;
  padding: 12px 18px;
  background: #222a38;
  color: var(--text);
  font-weight: 700;
  text-decoration: none;
}

a:hover { border-color: var(--blue); }
</style>
</head>
<body>
<main>
  <h1>KEITO大戦争</h1>
  <p>ゲーム画面を開いています。自動で移動しない場合は、下のボタンから進んでください。</p>
  <a href="game.html">ゲームを開く</a>
</main>
</body>
</html>
